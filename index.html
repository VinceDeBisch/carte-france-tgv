<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Carte France TGV</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
}
    #panel{
position:absolute;
top:10px;
left:10px;
z-index:1000;
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
width:260px;
        <h3>Villes trouvées : <span id="count">0</span></h3>
}

#map{
height:100vh;
width:100%;
}
</style>
</head>

<body>
<div id="panel">

<label>
Paris → TGV ≤
<span id="tgvValue">120</span> min
</label>

<input
type="range"
id="tgvFilter"
min="0"
max="240"
value="120">

<br><br>

<label>
Ville → Gare ≤
<span id="gareValue">60</span> min
</label>

<input
type="range"
id="gareFilter"
min="0"
max="120"
value="60">

<br><br>

<label>
Ville → Côte ≤
<span id="coteValue">60</span> min
</label>

<input
type="range"
id="coteFilter"
min="0"
max="120"
value="60">

</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([46.5,2.5],6);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

let allCities = [];
let markers = [];

fetch("villes.json")
.then(response => response.json())
.then(villes => {

    allCities = villes;

    updateMap();

});

function updateMap(){

    markers.forEach(marker => map.removeLayer(marker));

    markers = [];

    const tgvMax =
        Number(document.getElementById("tgvFilter").value);

    const gareMax =
        Number(document.getElementById("gareFilter").value);

    const coteMax =
        Number(document.getElementById("coteFilter").value);

    allCities
        .filter(ville =>
            ville.tgvParis <= tgvMax &&
            ville.gare <= gareMax &&
            ville.cote <= coteMax
        )
       const filteredCities = allCities.filter(ville =>
    ville.tgvParis <= tgvMax &&
    ville.gare <= gareMax &&
    ville.cote <= coteMax
);

document.getElementById("count").textContent =
    filteredCities.length;

filteredCities.forEach(ville => {
        .forEach(ville => {

            const marker =
                L.marker([ville.lat, ville.lng])
                .addTo(map)
                .bindPopup(`
                    <h3>${ville.nom}</h3>
                    <p>Paris → TGV : ${ville.tgvParis} min</p>
                    <p>Ville → Gare : ${ville.gare} min</p>
                    <p>Ville → Côte : ${ville.cote} min</p>
                `);

            markers.push(marker);

        });

}
    document
.getElementById("tgvFilter")
.addEventListener("input", e => {

    document
    .getElementById("tgvValue")
    .textContent = e.target.value;

    updateMap();

});

document
.getElementById("gareFilter")
.addEventListener("input", e => {

    document
    .getElementById("gareValue")
    .textContent = e.target.value;

    updateMap();

});

document
.getElementById("coteFilter")
.addEventListener("input", e => {

    document
    .getElementById("coteValue")
    .textContent = e.target.value;

    updateMap();

});
</script>

</body>
</html>
