<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Carte France TGV</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
}

#map{
height:100vh;
width:100%;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([46.5,2.5],6);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

fetch("villes.json")
.then(response => response.json())
.then(villes => {

    villes.forEach(ville => {

        L.marker([ville.lat, ville.lng])
        .addTo(map)
        .bindPopup(`
            <h3>${ville.nom}</h3>
            <p>Paris → TGV : ${ville.tgvParis} min</p>
            <p>Ville → Gare : ${ville.gare} min</p>
            <p>Ville → Côte : ${ville.cote} min</p>
        `);

    });

});

</script>

</body>
</html>
